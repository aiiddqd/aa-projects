catalog_index:
  path: /catalog
  controller: App\CatalogBundle\Controller\CatalogController::index

catalog_new:
  path: /catalog/new
  controller: App\CatalogBundle\Controller\CatalogController::newItem

catalog_edit:
  path: /catalog/{id<\d+>}/edit
  controller: App\CatalogBundle\Controller\CatalogController::editItem

